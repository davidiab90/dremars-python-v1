    <style>
        * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    width: 100vw; 
    height: 100vh; 
}
html {
    width: 100%;
    height: 100%;
}
        @font-face {
            font-family: 'VerdanaBold';
            src: url('{{ url_for("static", filename="fonts/VerdanaBold.woff2") }}') format('woff2');
        }
        @font-face {
            font-family: 'Verdana';
            src: url('{{ url_for("static", filename="fonts/Verdana.woff2") }}') format('woff2');
        } 
        @font-face {
            font-family: 'D-DIN';
            src: url('{{ url_for("static", filename="fonts/D-DIN.woff2") }}') format('woff2');
        } 
        @font-face {
            font-family: 'D-DINCo-Bold';
            src: url('{{ url_for("static", filename="fonts/D-DINCo-Bold.woff2") }}') format('woff2');
        } 
        @font-face {
            font-family: 'D-DIN-Bold';
            src: url('{{ url_for("static", filename="fonts/D-DIN-Bold.woff2") }}') format('woff2');
        }
        body { 
            font-family: 'D-DIN', sans-serif; 
            margin: 0; 
            color: #FFFFFF; 
            overflow-x: hidden; 
            width: 100%; 
            box-sizing: border-box; 
        }
        a { color: #FFFFFF; text-decoration: none; }
        nav {
            padding: 10px;
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            align-items: center;
            z-index: 10;
        }
        .logo { 
            height: 50px; 
            margin-left: 50px; 
            margin-right: 20px; 
            margin-top: 20px; 
        } 
        .nav-links {
            margin-left: 25px;
            margin-right: auto;
            margin-top: 20px;
            display: flex;
            align-items: baseline;
            flex-wrap: nowrap;
            position: relative;
        }
        .nav-links a {
            color: #FFFFFF;
            margin: 0 15px;
            text-decoration: none;
            padding: 5px;
            opacity: 0.7; 
            font-size: 13px;
            font-family: 'D-DIN-Bold', sans-serif;
            color: rgb(240, 240, 250);
            vertical-align: middle;
        }
        .nav-links a:hover { 
            color: #FFFFFF; 
            opacity: 0.9; 
        }
        .dropdown-project {
            position: relative;
            display: inline-block;
            flex-shrink: 0;
            margin: 0 15px;
            align-self: baseline;
        }
        .project-link {
            color: #FFFFFF;
            text-decoration: none;
            padding: 5px;
            opacity: 0.7;
            font-size: 13px;
            font-family: 'D-DIN-Bold', sans-serif;
            color: rgb(240, 240, 250);
            position: relative;
        }
        .dropdown-content-project {
            display: none;
            position: absolute;
            background-color: #ffffff00;
            min-width: 160px;
            z-index: 1000;
            top: 100%;
            left: 0; 
            box-shadow: none; 
            white-space: nowrap;
        }
        .dropdown-content-project a {
            color: #FFFFFF;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            opacity: 0.7; 
            font-size: 13px;
            font-family: 'D-DIN-Bold', sans-serif;
            color: rgb(240, 240, 250);
        }
        .dropdown-content-project a:hover {
            background-color: rgba(255, 255, 255, 0);
        }
        .dropdown-project:hover .dropdown-content-project {
            display: block;
        }
        .dropdown-project:hover .project-link::after {
            color: #FFFFFF;
        }
        .project-link::after {
            content: "\f078";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            color: transparent;
            z-index: 2;
        }
        .dropdown-ai {
            position: relative;
            display: inline-block;
            flex-shrink: 0;
            margin: 0 15px;
            align-self: baseline;
        }
        .ai-link {
            color: #FFFFFF;
            text-decoration: none;
            padding: 5px;
            opacity: 0.7;
            font-size: 13px;
            font-family: 'D-DIN-Bold', sans-serif;
            color: rgb(240, 240, 250);
            position: relative;
        }
        .dropdown-content-ai {
            display: none;
            position: absolute;
            background-color: #ffffff00;
            min-width: 160px;
            z-index: 1000;
            top: 100%;
            left: 0;
            box-shadow: none;
            white-space: nowrap;
        }
        .dropdown-content-ai a {
            color: #FFFFFF;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            opacity: 0.7;
            font-size: 13px;
            font-family: 'D-DIN-Bold', sans-serif;
            color: rgb(240, 240, 250);
        }
        .dropdown-content-ai a:hover {
            background-color: rgba(255, 255, 255, 0);
        }
        .dropdown-ai:hover .dropdown-content-ai {
            display: block;
        }
        .dropdown-ai:hover .ai-link::after {
            color: #FFFFFF;
        }
        .ai-link::after {
            content: "\f078";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            color: transparent;
            z-index: 2;
        }
        section { 
            padding: 50px 20px; 
        }
        .hero { 
            background-color: #000000;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            text-align: left;
            position: relative;
        } 
        .hero-content {
            margin-top: 30px; 
            position: relative;
            z-index: 2; 
            text-align: center;
        }
        h1 {
            font-size: 2.5em; 
            color: #FFFFFF; 
            margin-bottom: 10px; 
        } 
        .hero h2 { 
            font-size: 70px;
            color: #FFFFFF;
            margin: 10px 0;            
            position: relative;
            font-family: 'D-DIN-Bold', sans-serif;            
            color: rgb(240, 240, 250); 
            z-index: 2;
        }
        .hero p { 
            font-size: 17px; 
            color: #FFFFFF; 
            margin-bottom: 1px;           
            margin-top: 7px;
            position: relative;
            z-index: 2;            
            font-family: 'D-DIN', sans-serif; 
            color: rgb(240, 240, 250);
        }
        .hero .gradient-overlay-left-hero {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%; 
            background: linear-gradient(to left, rgb(0, 0, 0) 0%, rgba(255, 255, 255, 0) 66.67%); 
            z-index: 1; 
        }
        .hero::before { 
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.10); 
            z-index: 1; 
        }     
        .hero .button { 
            font-family: 'Verdana', sans-serif; 
            font-weight: 400; 
            font-size: 1.1em; 
        }
        .form { 
            margin: 20px auto; 
            max-width: 400px; 
            font-family: 'D-DIN', sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center; 
        }
        .label { 
            margin: 15px 0 5px 0; 
            font-family: 'D-DIN', sans-serif; 
            color: #FFFFFF;
            text-align: center;
        }
        .input { 
            margin-bottom: 15px; 
            padding: 10px; 
            background-color: #D9E4E6; 
            border: none; 
            width: 100%; 
            box-sizing: border-box;
            font-family: 'D-DIN', sans-serif; 
        }
        .button {
            display: inline-block;
            padding: 15px 30px; 
            background-color: #1C2526;
            color: #FFFFFF;
            text-decoration: none;
            margin-top: 60px;
            margin-left: 40px;
            border: .9px solid #FFFFFF; 
            border-radius: 3.0px; 
            opacity: 90%;
            position: relative;
            z-index: 3;
        }
        .button:hover { 
            background-color: #FFFFFF; 
        }
        .explore-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: transparent;
            color: #FFFFFF;
            text-decoration: none;
            margin-top: 20px;
            align-self: center;         
            border: 1px solid #FFFFFF;
            border-radius: 5px;
            font-family: 'D-DIN', sans-serif;
            font-size: 16px;
            position: relative;
            z-index: 3;
            transition: all 0.3s ease;
        }
        .explore-button:hover {
            background-color: #FFFFFF;
            color: #000000;
        }
        .explore-button i {
            margin-left: 10px;
            transition: transform 0.3s ease;
        }
        .explore-button:hover i {
            transform: translateX(5px);
        }
        .footer { 
            background-color: #000000; 
            padding: 10px; 
            text-align: center; 
            position: relative;
        }
        .footer-content {
            display: flex;
            align-items: center; 
            justify-content: flex-start;
            margin-left: 50px;
            margin-bottom: 5px;
            gap: 500px; 
        }
        .footer-content p {
            margin: 0; 
            font-size: 16px;
        }
        .footer-content p a { 
            color: #FFFFFF; 
            margin: 0 15px; 
            text-decoration: none; 
            padding: 5px; 
            font-size: 12px;
            font-family: 'D-DIN', sans-serif; 
            margin-left: 5px; 
            color: rgb(255, 255, 255); 
        }
        .footer-content-logo {
            margin-right: 0;
        }
        .x-button {
            width: 48px; 
            height: 50.4px; 
            border-radius: 50%; 
            border: none; 
            background-color: #1C2526; 
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 0; 
            overflow: hidden; 
            z-index: 2; 
            text-decoration: none; 
            display: inline-flex; 
        }       
        .x-logo {
            width: 12px;
            height: 14.4px;
            object-fit: contain; 
        }
        .footer .gradient-overlay-footer {
            position: absolute;
            bottom: 70px;
            left: 0;
            width: 100%;
            height: 350px;
            background: linear-gradient(to top, rgb(0, 0, 0) 0%, rgba(255, 255, 255, 0) 25%); 
            z-index: 1; 
        }
@media (max-width: 768px) {
    
    body {
        padding: 0;
        margin: 0;
    }
    nav, .hero {
        padding: 0 5px;
    }
    nav {
        flex-direction: column; 
        padding: 15px;
    }
    .logo {
        margin-bottom: 10px;
        margin-left: 30px;
    }
    .nav-links {
        flex-direction: row; 
        gap: 10px;
        margin-left: 5px;
    }
    .dropdown-project {
        align-self: center; 
    }
    .nav-links a {
        font-size: 16px; 
    }
    .footer-content {
        flex-direction: row;
        margin-right: 5px;
        gap: 10px; 
    }
    .footer-content p {
        margin-left: 40px; 
        font-size: 16px;
    }
    .dropdown-project {
        position: relative; 
        display: inline-block;
    }
    .project-link {
        font-size: 16px; 
        color: #FFFFFF; 
        opacity: 0.7;
    }
    .dropdown-content-project {
        position: absolute; 
        top: 100%;
        left: 0;
        min-width: 100%; 
        box-sizing: border-box;
        z-index: 1000;
        background-color: #ffffff00;
    }
    .dropdown-content-project a {
        text-align: left; 
        font-size: 16px; 
    }
    .nav-links {
        justify-content: space-around; 
    }   
}
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('home') }}" class="logo-link">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Dreamars Logo" class="logo">
        <div class="nav-links">
            <a href="/">HOME</a>  
            <div class="dropdown-project">
                <span class="project-link">PROJECT</span>
                <div class="dropdown-content-project">
                    <a href="/project_original_designs">ORIGINAL DESIGNS</a>
                    <a href="/project_physical_projects">PHYSICAL PROJECTS</a>
                    <a href="/project_interior_plans">INTERIOR PLANS</a>
                </div>
            </div>
            <a href="/contact">CONTACT</a>
        </div>
    </nav>
        <section class="hero">
            <div class="gradient-overlay-left-hero"></div>
            <div class="hero-content">
                <h2>CONTACT</h2>
                <p>Contact us for your next project.</p>
                <form class="form" action="https://formsubmit.co/b72f19218a970644c200453bc33d594e" method="POST">
    <label class="label">Name:</label>
    <input class="input" type="text" name="name" placeholder="Your name" required>
    
    <label class="label">Email:</label>
    <input class="input" type="email" name="email" placeholder="your@email.com" required>
    
    <label class="label">Project details (optional):</label>
    <textarea class="input" name="message" rows="5" placeholder="m², location, style, budget..."></textarea>

    
    <button class="explore-button" type="submit">SEND <i class="fa-solid fa-arrow-right"></i></button>
</form>

{% if error %}
<p style="text-align: center; margin-top: 20px; color: orange;">{{ error }}</p>
{% endif %}
{% if success %}
<p style="text-align: center; margin-top: 20px; color: lime;">¡Gracias! Te contactamos pronto.</p>
{% endif %} 
        <p style="text-align: center; margin-top: 20px; color: #FFFFFF;">Email: info@dremars.com</p>
    </div>
</section>
    <footer class="footer">
    <div class="gradient-overlay-footer"></div>
    <div class="footer-content">
        <div class="footer-content-logo">
            <a href="https://x.com/Aetheron" target="_blank" class="x-button">
                <img src="{{ url_for('static', filename='logo_x.svg') }}" 
                     alt="X Logo" 
                     class="x-logo">
            </a>
            </div>
    <p>
        <a href="/">HOME</a>
        <a href="/contact">CONTACT</a>
    </p>
        </div>
    </footer>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const projectLink = document.querySelector('.project-link');
    const content = document.querySelector('.dropdown-content-project');
    if (window.innerWidth <= 768) {
        projectLink.addEventListener('click', function(e) {
            e.preventDefault(); 
            e.stopPropagation(); 
            content.style.display = content.style.display === 'block' ? 'none' : 'block';
        });
        document.addEventListener('click', function() {
            content.style.display = 'none';
        });
    }
});
</script>
</body>
</html>
